<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Website Locker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="popup">
    <main class="card">
      <h1>Website Locker</h1>

      <section class="section">
        <label class="label" for="domainInput">Domain</label>
        <input id="domainInput" type="text" placeholder="example.com" autocomplete="off" />

        <label class="label" for="passwordInput">Password</label>
        <input id="passwordInput" type="password" placeholder="Set password" autocomplete="new-password" />

        <button id="addBtn" class="primary">Add Lock</button>
        <p id="status" class="status"></p>
      </section>

      <section class="section">
        <h2>Locked Domains</h2>
        <ul id="domainList" class="list"></ul>
        <p id="emptyState" class="muted">No locked domains yet.</p>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
